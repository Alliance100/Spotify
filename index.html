<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assests/css/style.css">
    <title>Spotify</title>
    <link rel="icon" type="image/x-icon" href="assests/img/favicon.ico">

</head>

<body>

    <div class="container">
        <div class="left">

            <div class="close">
                <img src="assests/img/close.svg" alt="">
            </div>




            <div class="home">
                <img width="110" class="" src="assests/img/logo.svg" alt="">
                <ul>
                    <li><img class="homeSvg" src="assests/img/home.svg" alt="home"> Home</li>
                    <li><img class="searchSvg" src="assests/img/search.svg" alt="search"> Search</li>
                </ul>
            </div>


            <div class="library">
                <div class="heading">

                    <img class="invert playlist" src="assests/img/playlist.svg" alt="">
                    <h2>Your Library</h2>

                </div>

                <div class="songList">

                    <ul>

                    </ul>
                </div>

                <div class="footer">
                    <div><a href="https://www.spotify.com/jp/legal/" target="_blank"><span>Legal</span></a></div>
                    <div><a href="https://www.spotify.com/jp/privacy/" target="_blank"><span>Privacy Center</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/" target="_blank"><span>Privacy Policy</span></a>
                    </div>
                    <div><a href="https://www.spotify.com/jp/legal/cookies-policy/" target="_blank"><span>Cookies</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/#s3" target="_blank"><span>About Ads</span></a></div>
                    <div><a href="https://www.spotify.com/jp/accessibility/" target="_blank"><span>Accessibility</span></a></div>
                </div>

            </div>

        </div>

        <div class="right">
            <div class="header">

                <div class="nav">

                    <img width="40" class="hamburger" src="assests/img/hamburger.svg" alt="">

                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M15 6L9.70711 11.2929C9.37377 11.6262 9.20711 11.7929 9.20711 12C9.20711 12.2071 9.37377 12.3738 9.70711 12.7071L15 18"
                            stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M9 18L14.2929 12.7071C14.6262 12.3738 14.7929 12.2071 14.7929 12C14.7929 11.7929 14.6262 11.6262 14.2929 11.2929L9 6"
                            stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>


                <div class="buttons">
                    <button class="signupbtn">Sign up</button>
                    <button class="loginbtn">Log in</button>
                </div>
            </div>

            <div class="playlist">
                <h1>Spotify Playlists</h1>

                <div class="cardContainer">
    
                </div>

                <div class="playbar">

                    <div class="songinfo"></div>

                    <div class="seekbar">

                        <div class="circle">

                        </div>
                    </div>



                    <div class="songbuttons">
                        <img width="35" id="previous" src="assests/img/prevsong.svg" alt="">
                        <img width="35" id="play" src="assests/img/play.svg" alt="">
                        <img width="35" id="next" src="assests/img/nextsong.svg" alt="">
                    </div>

                    <div class="songtime"></div>
                </div>
            </div>

        </div>

    </div>

    <script src="assests/js/script.js"></script>
</body>

</html>
